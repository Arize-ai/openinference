name: Python Canary Cron

on:
  schedule:
    - cron: "0 18 * * 1-5"
  workflow_dispatch:

env:
  UV_EXCLUDE_NEWER: "3 days"

jobs:
  find-tox-testenv:
    name: Find tox testenv
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.testenv.outputs.list }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: python
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          version: 0.11.2
          enable-cache: false
      - name: Extract testenv into JSON list
        run: >-
          echo "list=$(uvx --with tox-uv tox -l
          | egrep -e '-latest$'
          | jq -R -s -c 'split("\n")[:-1]')"
          >> $GITHUB_OUTPUT
        working-directory: python
        id: testenv

  canary:
    name: ${{ matrix.testenv }}
    needs: find-tox-testenv
    if: ${{ needs.find-tox-testenv.outputs.list != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testenv: ${{ fromJSON(needs.find-tox-testenv.outputs.list) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: python
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          version: 0.11.2
          enable-cache: false
      - run: uvx --with tox-uv tox r -e ${{ matrix.testenv }} -- -ra -x
        working-directory: python
        timeout-minutes: 15
      - run: touch ${{ runner.temp }}/${{ matrix.testenv }}
        if: failure()
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: ${{ matrix.testenv }}
          path: ${{ runner.temp }}/${{ matrix.testenv }}
          retention-days: 1

  slack:
    name: Slack notification
    needs: canary
    if: ${{ always() }}
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ needs.canary.result == 'failure' }}
      - name: List failures
        if: ${{ needs.canary.result == 'failure' }}
        run: |
          {
            echo "list<<EOF"
            find . -maxdepth 1 -type d ! -name '.' | sed 's|^\./||' | sort | nl -w2 -s'. '
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: failures
      - name: Build message
        env:
          CANARY_RESULT: ${{ needs.canary.result }}
          FAILURE_LIST: ${{ steps.failures.outputs.list }}
        run: |
          if [ "$CANARY_RESULT" = "failure" ]; then
            MSG="Python canary cron failed:
          $FAILURE_LIST
          $RUN_URL"
          else
            MSG="Python canary cron passed: $RUN_URL"
          fi
          {
            echo "text<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: message
      - name: Send message to Slack
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "type": "mrkdwn",
              "text": ${{ toJSON(steps.message.outputs.text) }}
            }

  auto-fix:
    name: Propose fix for failures
    needs: canary
    if: ${{ always() && needs.canary.result == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      branch_name: ${{ steps.auto-fix.outputs.branch_name }}
    permissions:
      actions: read
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: anthropics/claude-code-action@094bd24d575e7b30ac1576024817bf1a97c81262 # v1.0.80
        id: auto-fix
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_permissions: |
            actions: read
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(gh *)",
                  "Bash(git *)",
                  "Bash(uvx *)",
                  "Bash(tox *)",
                  "Bash(cd *)",
                  "Bash(ls *)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep",
                  "WebFetch",
                  "WebSearch"
                ]
              }
            }
          prompt: |
            The Python canary cron has failures.

            Run /python-canary-fix to investigate these failures, draft a fix, and open a PR.

            The run ID is ${{ github.run_id }} and the repo is ${{ github.repository }}.
            Use `gh run view ${{ github.run_id }} --repo ${{ github.repository }}` to inspect job logs.


  auto-fix-slack:
    name: Slack auto-fix PR notification
    needs:
      - canary
      - auto-fix
    if: ${{ always() && needs.canary.result == 'failure' && needs.auto-fix.result != 'skipped' }}
    runs-on: ubuntu-latest
    env:
      AUTO_FIX_RESULT: ${{ needs.auto-fix.result }}
      BRANCH_NAME: ${{ needs.auto-fix.outputs.branch_name }}
      GH_TOKEN: ${{ github.token }}
      RUN_ID: ${{ github.run_id }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Resolve PR URL
        id: pr
        run: |
          PR_URL=""

          if [ -n "$BRANCH_NAME" ]; then
            PR_URL=$(gh pr view "$BRANCH_NAME" --json url -q .url 2>/dev/null || true)
          fi

          if [ -z "$PR_URL" ]; then
            PR_URL=$(
              gh pr list \
                --state open \
                --limit 100 \
                --json url,author,body \
                -q ".[] | select(.author.login == \"app/claude\" and ((.body // \"\") | contains(\"$RUN_ID\"))) | .url" \
                | head -n 1
            )
          fi

          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Build message
        id: message
        env:
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          if [ -n "$PR_URL" ]; then
            if [ "$AUTO_FIX_RESULT" = "cancelled" ]; then
              MSG="Auto-fix PR opened before the canary fix job timed out: $PR_URL"
            else
              MSG="Auto-fix PR opened for canary failures: $PR_URL"
            fi
          else
            MSG="Python canary auto-fix finished with result '$AUTO_FIX_RESULT', but no PR was found for run $RUN_ID: $RUN_URL"
          fi

          {
            echo "text<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send message to Slack
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "type": "mrkdwn",
              "text": ${{ toJSON(steps.message.outputs.text) }}
            }
