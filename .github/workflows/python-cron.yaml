name: Python Canary Cron

on:
  schedule:
    - cron: "0 18 * * 1-5"
  workflow_dispatch:

jobs:
  find-tox-testenv:
    name: Find tox testenv
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.testenv.outputs.list }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: python
      - uses: astral-sh/setup-uv@v5
        with:
          version: 0.6.3
          enable-cache: false
      - name: Extract testenv into JSON list
        run: >-
          echo "list=$(uvx --with tox-uv tox -l
          | egrep -e '-latest$'
          | jq -R -s -c 'split("\n")[:-1]')"
          >> $GITHUB_OUTPUT
        working-directory: python
        id: testenv

  canary:
    name: ${{ matrix.testenv }}
    needs: find-tox-testenv
    if: ${{ needs.find-tox-testenv.outputs.list != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testenv: ${{ fromJSON(needs.find-tox-testenv.outputs.list) }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: python
      - uses: astral-sh/setup-uv@v5
        with:
          version: 0.6.3
          enable-cache: false
      - run: uvx --with tox-uv tox r -e ${{ matrix.testenv }} -- -ra -x
        working-directory: python
        timeout-minutes: 15
      - run: touch ${{ runner.temp }}/${{ matrix.testenv }}
        if: failure()
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ matrix.testenv }}
          path: ${{ runner.temp }}/${{ matrix.testenv }}
          retention-days: 1

  slack:
    name: Slack notification
    needs: canary
    if: ${{ always() }}
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    outputs:
      failure_list: ${{ steps.failures.outputs.list }}
    steps:
      - uses: actions/download-artifact@v4
        if: ${{ needs.canary.result == 'failure' }}
      - name: List failures
        if: ${{ needs.canary.result == 'failure' }}
        run: |
          {
            echo "list<<EOF"
            find . -maxdepth 1 -type d ! -name '.' | sed 's|^\./||' | sort | nl -w2 -s'. '
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: failures
      - name: Build message
        env:
          CANARY_RESULT: ${{ needs.canary.result }}
          FAILURE_LIST: ${{ steps.failures.outputs.list }}
        run: |
          if [ "$CANARY_RESULT" = "failure" ]; then
            MSG="Python canary cron failed:
          $FAILURE_LIST
          $RUN_URL"
          else
            MSG="Python canary cron passed: $RUN_URL"
          fi
          {
            echo "text<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: message
      - name: Send message to Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "type": "mrkdwn",
              "text": ${{ toJSON(steps.message.outputs.text) }}
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  auto-fix:
    name: Propose fix for failures
    needs: slack
    if: ${{ needs.slack.outputs.failure_list != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            The following Python canary cron jobs failed:

            ${{ needs.slack.outputs.failure_list }}

            Run /python-canary-fix to investigate these failures, draft a fix, and open a PR.

            The run ID is ${{ github.run_id }} and the repo is ${{ github.repository }}.
            Use `gh run view ${{ github.run_id }} --repo ${{ github.repository }}` to inspect job logs.
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
