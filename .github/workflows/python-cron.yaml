name: Python Canary Cron

on:
  schedule:
    - cron: "0 18 * * 1-5"
  workflow_dispatch:

env:
  UV_EXCLUDE_NEWER: "3 days"

jobs:
  find-tox-testenv:
    name: Find tox testenv
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.testenv.outputs.list }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: python
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: 0.11.2
          enable-cache: false
      - name: Extract testenv into JSON list
        run: >-
          echo "list=$(uvx --with tox-uv tox -l
          | egrep -e '-latest$'
          | jq -R -s -c 'split("\n")[:-1]')"
          >> $GITHUB_OUTPUT
        working-directory: python
        id: testenv

  canary:
    name: ${{ matrix.testenv }}
    needs: find-tox-testenv
    if: ${{ needs.find-tox-testenv.outputs.list != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testenv: ${{ fromJSON(needs.find-tox-testenv.outputs.list) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: python
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: 0.11.2
          enable-cache: false
      - run: uvx --with tox-uv tox r -e ${{ matrix.testenv }} -- -ra -x
        working-directory: python
        timeout-minutes: 15
      - run: touch ${{ runner.temp }}/${{ matrix.testenv }}
        if: failure()
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: ${{ matrix.testenv }}
          path: ${{ runner.temp }}/${{ matrix.testenv }}
          retention-days: 1

  slack:
    name: Slack notification
    needs: canary
    if: ${{ always() }}
    runs-on: ubuntu-latest
    env:
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        if: ${{ needs.canary.result == 'failure' }}
      - name: List failures
        if: ${{ needs.canary.result == 'failure' }}
        run: |
          {
            echo "list<<EOF"
            find . -maxdepth 1 -type d ! -name '.' | sed 's|^\./||' | sort | nl -w2 -s'. '
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: failures
      - name: Build message
        env:
          CANARY_RESULT: ${{ needs.canary.result }}
          FAILURE_LIST: ${{ steps.failures.outputs.list }}
        run: |
          if [ "$CANARY_RESULT" = "failure" ]; then
            MSG="Python canary cron failed:
          $FAILURE_LIST
          $RUN_URL"
          else
            MSG="Python canary cron passed: $RUN_URL"
          fi
          {
            echo "text<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: message
      - name: Send message to Slack
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "type": "mrkdwn",
              "text": ${{ toJSON(steps.message.outputs.text) }}
            }

  auto-fix:
    name: Propose fix for failures
    needs: canary
    if: ${{ always() && needs.canary.result == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: anthropics/claude-code-action@88c168b39e7e64da0286d812b6e9fbebb6708185 # v1
        id: auto-fix
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            The Python canary cron has failures.

            Run /python-canary-fix to investigate these failures, draft a fix, and open a PR.

            The run ID is ${{ github.run_id }} and the repo is ${{ github.repository }}.
            Use `gh run view ${{ github.run_id }} --repo ${{ github.repository }}` to inspect job logs.
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
      - name: Notify Slack of auto-fix PR
        if: ${{ steps.auto-fix.outputs.branch_name != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ steps.auto-fix.outputs.branch_name }}
        run: |
          PR_URL=$(gh pr view "$BRANCH_NAME" --json url -q .url 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            MSG="Auto-fix PR opened for canary failures: $PR_URL"
          else
            MSG="Auto-fix branch created but no PR found: $BRANCH_NAME"
          fi
          echo "$MSG"
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$(jq -n --arg text "$MSG" '{type: "mrkdwn", text: $text}')" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
