name: Go CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN: this workflow only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: test-go-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Filter Changes
    runs-on: ubuntu-latest
    outputs:
      diff: ${{ steps.filter.outputs.diff }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            diff:
              - ".github/workflows/go-CI.yaml"
              - "go/go.work"
              - "go/go.work.sum"
              - "go/openinference-semantic-conventions/**"
              - "go/openinference-instrumentation/**"
              - "go/openinference-instrumentation-anthropic-sdk-go/**"
              - "scripts/check_go_semconv.py"
              - "python/openinference-semantic-conventions/src/openinference/semconv/trace/__init__.py"

  ci:
    name: CI Go
    needs: changes
    if: ${{ needs.changes.outputs.diff == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go/openinference-semantic-conventions/go.mod
          cache: true
          # Glob catches every module's go.sum (semconv has none today,
          # since it has no external deps) plus the workspace-level
          # go.work.sum that aggregates them.
          cache-dependency-path: |
            go/go.work.sum
            go/**/go.sum

      - name: gofmt
        working-directory: ./go
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet (workspace)
        working-directory: ./go
        run: |
          go vet ./openinference-semantic-conventions/... \
                 ./openinference-instrumentation/... \
                 ./openinference-instrumentation-anthropic-sdk-go/... \
                 ./openinference-instrumentation-anthropic-sdk-go/examples/auto-instrumentation/... \
                 ./openinference-instrumentation-anthropic-sdk-go/examples/manual-instrumentation/...

      - name: go test (workspace)
        working-directory: ./go
        run: |
          go test -race -count=1 \
            ./openinference-semantic-conventions/... \
            ./openinference-instrumentation/... \
            ./openinference-instrumentation-anthropic-sdk-go/... \
            ./openinference-instrumentation-anthropic-sdk-go/examples/auto-instrumentation/... \
            ./openinference-instrumentation-anthropic-sdk-go/examples/manual-instrumentation/...

      - name: Set up Python for semconv drift check
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Verify Go semconv covers Python source
        run: python3 scripts/check_go_semconv.py

  ci-required:
    name: Go CI Required
    needs: [changes, ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs were cancelled"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"
