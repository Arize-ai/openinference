on:
  workflow_dispatch:

name: Publish all packages

permissions:
  contents: read

jobs:
  list-python-packages:
    name: List Python packages from manifest
    runs-on: ubuntu-latest
    outputs:
      python_paths: ${{ steps.paths.outputs.python_paths }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: python
      - name: Get Python paths not yet on PyPI
        id: paths
        run: |
          NEED_PUBLISH='[]'
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            NAME=$(sed -n 's/^name = "\(.*\)"$/\1/p' "$path/pyproject.toml")
            VERSION=$(jq -r ".\"$path\"" .release-please-manifest.json)
            if [ -z "$NAME" ] || [ "$VERSION" = "null" ]; then
              echo "Including $path (name or version missing)"
              NEED_PUBLISH=$(jq -c --arg p "$path" '. + [$p]' <<< "$NEED_PUBLISH")
              continue
            fi
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${NAME}/${VERSION}/json")
            if [ "$HTTP" != "200" ]; then
              echo "${NAME}==${VERSION} not on PyPI (HTTP ${HTTP}), will publish"
              NEED_PUBLISH=$(jq -c --arg p "$path" '. + [$p]' <<< "$NEED_PUBLISH")
            else
              echo "${NAME}==${VERSION} already on PyPI, skipping"
            fi
          done <<< "$(jq -r 'keys[] | select(startswith("python/"))' .release-please-manifest.json)"
          echo "python_paths=$NEED_PUBLISH" >> $GITHUB_OUTPUT
          echo "Paths to publish: $NEED_PUBLISH"

  publish-python:
    name: Publish Python distribution
    runs-on: ubuntu-latest
    needs: list-python-packages
    if: needs.list-python-packages.outputs.python_paths != '[]'
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.list-python-packages.outputs.python_paths) }}
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: python
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install utilities
        run: python -m pip install build check_wheel_contents twine
      - name: Build distribution
        run: python -m build
      - name: Check wheel contents
        run: check-wheel-contents dist/*.whl
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: '__token__'
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload --skip-existing --verbose dist/*
      - run: echo "NAME=python-$(basename ${{ matrix.path }})" >> $GITHUB_ENV
        if: failure()
      - run: touch ${{ runner.temp }}/${{ env.NAME }}
        if: failure()
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ env.NAME }}
          path: ${{ runner.temp }}/${{ env.NAME }}
          retention-days: 1

  list-java-packages:
    name: List Java packages from manifest
    runs-on: ubuntu-latest
    outputs:
      java_paths: ${{ steps.paths.outputs.java_paths }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: java
      - name: Get Java paths not yet on Maven Central
        id: paths
        run: |
          # groupId from java/build.gradle allprojects { group = 'com.arize' }
          GROUP_ID="com.arize"
          NEED_PUBLISH='[]'
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            ARTIFACT_ID=$(basename "$path")
            VERSION=$(jq -r ".\"$path\"" .release-please-manifest.json)
            if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
              echo "Including $path (version missing)"
              NEED_PUBLISH=$(jq -c --arg p "$path" '. + [$p]' <<< "$NEED_PUBLISH")
              continue
            fi
            NUM_FOUND=$(curl -s -G "https://search.maven.org/solrsearch/select" \
              --data-urlencode "q=g:${GROUP_ID} AND a:${ARTIFACT_ID} AND v:${VERSION}" \
              --data-urlencode "wt=json" | jq -r '.response.numFound // 0')
            if [ "$NUM_FOUND" = "0" ] || [ -z "$NUM_FOUND" ]; then
              echo "${GROUP_ID}:${ARTIFACT_ID}:${VERSION} not on Maven Central, will publish"
              NEED_PUBLISH=$(jq -c --arg p "$path" '. + [$p]' <<< "$NEED_PUBLISH")
            else
              echo "${GROUP_ID}:${ARTIFACT_ID}:${VERSION} already on Maven Central, skipping"
            fi
          done <<< "$(jq -r 'keys[] | select(startswith("java/"))' .release-please-manifest.json)"
          echo "java_paths=$NEED_PUBLISH" >> $GITHUB_OUTPUT
          echo "Paths to publish (Java): $NEED_PUBLISH"

  publish-java:
    name: Publish Java packages
    runs-on: ubuntu-latest
    needs: list-java-packages
    if: needs.list-java-packages.outputs.java_paths != '[]'
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.list-java-packages.outputs.java_paths) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Set versions from release-please manifest
        working-directory: ./java
        run: |
          echo "Setting versions for all Java packages to ensure dependency resolution..."
          while IFS= read -r java_path; do
            if [ -n "$java_path" ]; then
              PACKAGE_VERSION=$(jq -r ".\"$java_path\"" ../.release-please-manifest.json)
              RELATIVE_PATH="${java_path#java/}"
              GRADLE_PROPS_FILE="${RELATIVE_PATH}/gradle.properties"
              if [ -f "$GRADLE_PROPS_FILE" ] && [ "$PACKAGE_VERSION" != "null" ]; then
                echo "Updating ${GRADLE_PROPS_FILE} with version: $PACKAGE_VERSION"
                if grep -q "version=\$VERSION" "$GRADLE_PROPS_FILE"; then
                  sed -i "s/version=\$VERSION/version=$PACKAGE_VERSION/" "$GRADLE_PROPS_FILE"
                else
                  sed -i "s/^version=.*/version=$PACKAGE_VERSION/" "$GRADLE_PROPS_FILE"
                fi
                echo "Updated version: $(grep version= "$GRADLE_PROPS_FILE")"
              fi
            fi
          done <<< "$(jq -r 'keys[] | select(startswith("java/"))' ../.release-please-manifest.json)"
          echo "All Java package versions have been updated for proper dependency resolution"

      - name: Stage artifacts locally
        working-directory: ./java
        run: |
          RELATIVE_PATH="${{ matrix.path }}"
          RELATIVE_PATH="${RELATIVE_PATH#java/}"
          GRADLE_PROJECT=$(echo ":${RELATIVE_PATH}" | sed 's|/|:|g')
          ./gradlew clean "${GRADLE_PROJECT}:publish"

      - name: Deploy to Maven Central with JReleaser
        working-directory: ./java
        env:
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRETKEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLICKEY }}
        run: |
          RELATIVE_PATH="${{ matrix.path }}"
          RELATIVE_PATH="${RELATIVE_PATH#java/}"
          ./gradlew -PjreleaserStagingRepository=${RELATIVE_PATH}/build/staging-deploy jreleaserDeploy

      - run: echo "NAME=java-$(basename ${{ matrix.path }})" >> $GITHUB_ENV
        if: failure()
      - run: touch ${{ runner.temp }}/${{ env.NAME }}
        if: failure()
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ env.NAME }}
          path: ${{ runner.temp }}/${{ env.NAME }}
          retention-days: 1

      - name: Clean up
        if: always()
        run: |
          rm -rf ./java/build/staging-deploy

  slack:
    name: Slack notification on failure
    needs: [publish-python, publish-java]
    if: always() && (needs.publish-python.result != 'skipped' || needs.publish-java.result != 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        continue-on-error: true
      - name: List failures as markdown
        run: |
          {
            echo "list<<EOF"
            find . -maxdepth 1 -type d ! -name '.' | sed 's|^\./||' | nl -w2 -s'. '
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: failures
      - name: Create message text
        if: steps.failures.outputs.list != ''
        run: |
          {
            echo "text<<EOF"
            echo "Publication failed for the following packages:"
            echo "${{ steps.failures.outputs.list }}"
            echo ""
            echo "Re-run publish workflow if error is transient."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        id: message
      - name: Send message to Slack
        if: steps.failures.outputs.list != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "type": "mrkdwn",
              "text": ${{ toJSON(steps.message.outputs.text) }}
            }
