name: "CLA Assistant"
on:
    issue_comment:
        types: [created]
    pull_request_target:
        types: [assigned, opened, synchronize, reopened]

# Default to no permissions; the CLA job below requests only what it needs.
permissions: {}

jobs:
    CLAAssistant:
        runs-on: ubuntu-latest
        permissions:
            actions: write
            contents: write
            pull-requests: write
            statuses: write
        steps:
            - name: "CLA Assistant"
              if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
              uses: contributor-assistant/github-action@5bfe123a0731f017d9c29550976bf724fe0870f5 # v2.3.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  path-to-signatures: "signatures/version1/cla.json"
                  path-to-document: "https://github.com/Arize-ai/openinference/blob/main/CLA.md"
                  branch: "cla"
                  allowlist: gitbook-bot, github-actions, dependabot, dependabot[bot], @dependabot[bot], cursoragent, claude
