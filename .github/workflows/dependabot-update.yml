name: Check dependencies update

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: "0 13 * * 1"  # once a week monday mornings

jobs:
  sync-dependabot-update:
    name: Sync Dependabot yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'  # Specify Python version 

      - name: Install dependencies
        run: |
          pip install pyyaml  # Install PyYAML for the script

      - name: Capture existing dependabot.yml
        run: |
          if [ -f .github/dependabot.yml ]; then
            cp .github/dependabot.yml /tmp/dependabot-before.yml
          else
            printf 'version: 2\nupdates: []\n' > /tmp/dependabot-before.yml
          fi

      - name: Generate new dependabot.yml
        run: |
          python scripts/generate_dependabot.py > .github/dependabot.yml

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet -- .github/dependabot.yml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            BEFORE_FILE=/tmp/dependabot-before.yml AFTER_FILE=.github/dependabot.yml GITHUB_OUTPUT=$GITHUB_OUTPUT python <<'PY'
            import os
            from pathlib import Path

            import yaml


            def load_directories(path: str) -> list[str]:
                content = yaml.safe_load(Path(path).read_text()) or {}
                updates = content.get("updates", [])
                return [update["directory"] for update in updates]


            before = load_directories(os.environ["BEFORE_FILE"])
            after = load_directories(os.environ["AFTER_FILE"])

            added = sorted(set(after) - set(before))
            removed = sorted(set(before) - set(after))
            order_only = not added and not removed and before != after

            lines = ["## Changes"]
            if added:
                lines.append(f"- Added directories ({len(added)}):")
                lines.extend(f"  - `{directory}`" for directory in added)
            else:
                lines.append("- Added directories: none")

            if removed:
                lines.append(f"- Removed directories ({len(removed)}):")
                lines.extend(f"  - `{directory}`" for directory in removed)
            else:
                lines.append("- Removed directories: none")

            if order_only:
                lines.append("- Note: this PR only normalizes entry ordering.")

            lines.append("")
            lines.append("## What's changed")
            if added or removed:
                lines.append(
                    "This PR updates the Dependabot configuration to match the current package manifests in the repository."
                )
            else:
                lines.append(
                    "This PR updates the Dependabot configuration without changing the set of tracked package directories."
                )

            summary = "\n".join(lines)

            with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
                output.write(f"order_only={'true' if order_only else 'false'}\n")
                output.write("change_summary<<EOF\n")
                output.write(summary)
                output.write("\nEOF\n")
            PY
          fi

      - name: Generate timestamp
        id: timestamp
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d-%H-%M-%S")
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.verify-changed-files.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dependabot.yml configuration" 
          title: "chore: update dependabot.yml configuration" 
          body: |
            This change was automatically generated by the sync-dependabot-update workflow.
            
            ${{ steps.verify-changed-files.outputs.change_summary }}
          branch: update-dependabot-yml-${{ steps.timestamp.outputs.timestamp }}
          base: main
          delete-branch: true
