name: Bump openinference-instrumentation minimum version

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    if: startsWith(github.event.release.tag_name, 'python-openinference-instrumentation-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG="$RELEASE_TAG"
          VERSION="${TAG#python-openinference-instrumentation-v}"
          # The startsWith filter above also matches sub-package tags whose
          # name starts with 'v' (e.g. python-openinference-instrumentation-vertexai-v0.1.14).
          # Guard against that by requiring the suffix to be a bare semver.
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::notice::Tag $TAG is not a core openinference-instrumentation release (extracted '$VERSION'); skipping."
            exit 0
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update pyproject.toml files
        if: steps.version.outputs.version
        env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Match the quoted dependency string exactly to avoid touching
          # similarly-prefixed packages (e.g. openinference-instrumentation-openai)
          find python/instrumentation -name 'pyproject.toml' -exec \
            sed -i 's/"openinference-instrumentation>=.*"/"openinference-instrumentation>='"$NEW_VERSION"'"/' {} +

      - name: Create pull request
        if: steps.version.outputs.version
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE }}
          commit-message: "fix: bump openinference-instrumentation minimum to >=${{ steps.version.outputs.version }}"
          title: "fix: bump openinference-instrumentation minimum to >=${{ steps.version.outputs.version }}"
          body: |
            Automatically bumps the minimum `openinference-instrumentation` version
            to `>=${{ steps.version.outputs.version }}` across all Python instrumentor packages.

            Triggered by release [`${{ github.event.release.tag_name }}`](${{ github.event.release.html_url }}).
          branch: "bump-oi-instrumentation-${{ steps.version.outputs.version }}"
          base: main
