name: Claude Implement Issue

on:
  issues:
    types: [labeled]

jobs:
  implement:
    # Only run when good-agent-issue label is added
    if: github.event.label.name == 'good-agent-issue'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      GH_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Guard – check permissions and duplicates
        env:
          SENDER_LOGIN: ${{ github.event.sender.login }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # Verify sender has write access
          PERMISSION=$(gh api "repos/${REPOSITORY}/collaborators/${SENDER_LOGIN}/permission" -q '.permission')
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "maintain" && "$PERMISSION" != "write" ]]; then
            echo "Sender ${SENDER_LOGIN} has '$PERMISSION' permission, skipping"
            exit 0
          fi

          # Skip if already assigned
          ASSIGNEES=$(gh issue view "$ISSUE_NUMBER" --json assignees -q '.assignees | length')
          if [ "$ASSIGNEES" -gt 0 ]; then
            echo "Issue already assigned, skipping"
            exit 0
          fi

          # Skip if a PR already exists for this issue's branch
          EXISTING=$(gh pr list --head "claude/issue-$ISSUE_NUMBER" --json number -q 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists for claude/issue-$ISSUE_NUMBER, skipping"
            exit 0
          fi

          echo "READY=true" >> "$GITHUB_ENV"

      - name: Claim issue
        if: env.READY == 'true'
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "agent-in-progress"
          gh issue edit "$ISSUE_NUMBER" --add-assignee "mikeldking"
          gh issue comment "$ISSUE_NUMBER" --body "🤖 Agent is working on this issue. Follow progress in the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Checkout repository
        if: env.READY == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Create branch
        if: env.READY == 'true'
        run: |
          BRANCH="claude/issue-$ISSUE_NUMBER"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Run Claude Code
        if: env.READY == 'true'
        id: claude
        uses: anthropics/claude-code-action@094bd24d575e7b30ac1576024817bf1a97c81262 # v1.0.80
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          prompt: |
            Implement GitHub issue #${{ github.event.issue.number }} end-to-end. Deliver a complete, merge-ready PR.

            The keywords MUST, MUST NOT, SHALL, SHALL NOT, SHOULD, SHOULD NOT, RECOMMENDED, and OPTIONAL
            follow RFC 2119 conventions when they appear in all capitals.

            ## 1. Understand
            - You MUST run `gh issue view ${{ github.event.issue.number }}` to read the full issue and comments.
            - You MUST read CLAUDE.md to learn project tooling (`tox` for Python, `pnpm` for JS/TS, `./gradlew` for Java — as documented in CLAUDE.md's "Essential Commands" section).
            - You MUST explore relevant code, patterns, and conventions before writing anything.

            ## 2. Plan
            - You MUST outline your implementation approach before coding.
            - You SHOULD identify affected files, tests, and documentation.

            ## 3. Implement
            - You MUST follow existing codebase patterns and conventions.
            - You MUST add clear docstrings to new public functions, classes, and modules.
            - You MUST keep changes focused on the issue.
            - You MUST create a changeset via `pnpm changeset` if you modify any JS/TS packages under `js/`.

            ## 4. Validate
            - You MUST run /simplify and fix any issues found.
            - You MUST run tests, linting, and formatting using the language-specific commands in CLAUDE.md's "Essential Commands" section (`tox run-parallel` for Python, `pnpm run -r test && pnpm run lint` for JS/TS, `./gradlew test` for Java). All failures MUST be fixed.
            - You MUST update docs and skills/ files if affected by your changes. Documentation MUST be grounded in real code — verify examples and references against the actual implementation. You MUST NOT hallucinate documentation.

            ## 5. Ship
            - You MUST commit referencing #${{ github.event.issue.number }}, push, and open a PR via `gh pr create`.
            - You MUST write a clear PR description covering what changed, why, and how to verify.
            - You SHOULD include screenshots or examples when applicable.

            ## Acceptance Criteria
            All REQUIRED items MUST be satisfied before opening the PR. The PR MUST NOT be opened if any item is incomplete.
            - [ ] REQUIRED: Implementation plan reviewed
            - [ ] REQUIRED: Code reviewed with /simplify — no issues remaining
            - [ ] REQUIRED: Tests pass and validate the change
            - [ ] REQUIRED: Docstrings added to new public APIs
            - [ ] REQUIRED: Documentation updated and grounded in real code
            - [ ] REQUIRED: Changeset created (`pnpm changeset`) if JS/TS packages were modified
            - [ ] RECOMMENDED: Relevant skills updated under skills/ directory
            - [ ] REQUIRED: Linting and formatting pass
            - [ ] REQUIRED: PR created with a clear description
            - [ ] RECOMMENDED: Screenshots or examples included when applicable
          claude_args: '--allowedTools Read,Write,Edit,Glob,Grep,Agent,"Bash(git:*)","Bash(gh:*)","Bash(tox:*)","Bash(uv:*)","Bash(pnpm:*)","Bash(npx:*)","Bash(./gradlew:*)"'

      - name: Cleanup
        if: always() && env.READY == 'true'
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-assignee "mikeldking" --remove-label "agent-in-progress"
          if [ "${{ job.status }}" = "failure" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "Agent implementation failed. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi
