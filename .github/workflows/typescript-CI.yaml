name: Typescript CI

on:
    push:
        branches: [main]
    pull_request:
    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

concurrency:
    group: test-typescript-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Filter Changes
        runs-on: ubuntu-latest
        outputs:
            diff: ${{ steps.filter.outputs.diff }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
              id: filter
              with:
                  filters: |
                      diff:
                        - ".github/workflows/typescript-CI.yaml"
                        - "js/package.json"
                        - "js/pnpm-lock.json"
                        - "js/pnpm-workspace.yaml"
                        - "js/tsconfig.*.json"
                        - "js/.oxlintrc.json"
                        - "js/.oxfmtrc.jsonc"
                        - "js/packages/**/*.js"
                        - "js/packages/**/*.ts"
                        - "js/packages/**/package.json"
                        - "js/packages/**/tsconfig.*"

    ci:
        name: CI Typescript
        needs: changes
        if: ${{ needs.changes.outputs.diff == 'true' }}
        runs-on: ubuntu-latest
        env:
            NODE_OPTIONS: "--max-old-space-size=8192"
        steps:
            - name: Checkout Repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Set up Nodejs
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 20
            - name: Setup PNPM
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
              with:
                  version: 10.29.3
            - name: Install Dependencies
              working-directory: ./js
              run: pnpm install --frozen-lockfile -r
            - name: Pre-Build
              working-directory: ./js
              run: pnpm run -r prebuild
            - name: Build
              working-directory: ./js
              run: pnpm run -r build
              env:
                  NODE_OPTIONS: "--max-old-space-size=8192"
            - name: Test
              working-directory: ./js
              run: pnpm run -r test
            - name: Formatting
              working-directory: ./js
              run: |
                  pnpm run fmt:check
            - name: Type Checking
              working-directory: ./js
              run: |
                  pnpm run type:check
            - name: Linting
              working-directory: ./js
              run: |
                  pnpm run lint

    ci-required:
        name: Typescript CI Required
        needs: [changes, ci]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Check results
              run: |
                  if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
                    echo "One or more CI jobs failed"
                    exit 1
                  fi
                  if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
                    echo "One or more CI jobs were cancelled"
                    exit 1
                  fi
                  echo "All CI jobs passed or were skipped"
