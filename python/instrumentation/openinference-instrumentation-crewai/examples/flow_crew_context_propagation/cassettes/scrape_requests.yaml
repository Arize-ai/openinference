      processed by Docusign are compliant with the US ESIGN Act [ 5 ] and the European
      Union's eIDAS regulation, including EU Advanced and EU Qualified Signatures.
      [ 6 ]\\nIn April 2018, Docusign filed for an initial public offering . At the
      time of the IPO, the largest shareholders were venture investment firms Sigma
      Partners, Ignition Partners, Frazier Technology Ventures, and former CEO Keith
      Krach was the largest individual shareholder. None of the original founders
      are major shareholders. [ 7 ] [ 8 ] The company went public on the Nasdaq on
      April 27, 2018. [ 9 ]\\nHistory [ edit ]\\nDocusign was founded in 2003 by Court
      Lorenzini, Tom Gonser, and Eric Ranft. [ 10 ] Tom Gonser came up with the idea
      when he was CEO of NetUpdate, a company he founded in 1998. Throughout its history,
      NetUpdate had acquired several companies, including an e-signature start-up
      in Seattle called DocuTouch, funded by Timberline Venture Partners, Bill Kallman,
      and Jeff Tung with $4M. Timberline invested another $1 million in the merger
      into NetUpdate. [ 11 ] [ 12 ] DocuTouch held patents on Web-based digital signatures
      and collaboration. With internal support from Gonser, Lorenzini negotiated the
      purchase of certain DocuTouch assets from NetUpdate and started Docusign. Gonser
      then left the NetUpdate Board to focus on Docusign full-time.\\n The firm began
      sales in 2005 when zipForm, now zipLogix, integrated Docusign into its virtual
      real estate forms. According to Docusign, mock trials featuring licensed attorneys
      and judges highlighted the admissibility of Docusign contracts in court based
      on encrypted audit logs of signature events, and the impossibility of changing
      contracts. [ 13 ]\\nIn January 2007, Court Lorenzini stepped down as CEO and
      board chairman and was replaced as CEO by Matthew Schiltz, [ 14 ] who served
      in that role until January 2010. [ 15 ] Steven King replaced Schultz as CEO
      [ 15 ] and moved the corporate headquarters from Seattle to San Francisco. Keith
      Krach became Docusign's board chairman in January 2010 and its CEO in August
      2011. [ 16 ]\\nDocusign began referring to its service as \\\"eSignature Transaction
      Management\\\". By the end of 2010, the company had handled 73 percent of the
      SaaS -based electronic signature market, with 80 million signatures processed.
      [ 17 ] Scale Venture Partners led an investment round of $27 million in December
      2010. [ 18 ]\\nDocusign opened an office in London , England , in September
      2011. [ 19 ] In the same year, Docusign opened an office in San Francisco that
      now functions as its global headquarters. [ 20 ]\\nDocusign signed an agreement
      with PayPal in April 2012 that allowed users to capture signatures and payments
      in a single transaction. [ 21 ] Similar partnerships with Salesforce [ 22 ]
      and Google Drive [ 23 ] preceded the PayPal agreement.\\n On January 10, 2013,
      Docusign and Equifax announced a partnership to simplify electronic delivery
      of the Requests for Transcript of Tax Return Form 4506-T to the United States
      Internal Revenue Service . Under the partnership, Equifax allows lenders to
      use Docusign to securely send requests to loan applicants. Docusign and [ 24
      ] Equifax were among 14 firms that participated in a nine-month feasibility
      study of electronic signatures for 4506-T forms in 2011. [ 25 ]\\nIn October
      2015, Keith Krach announced he would step down as CEO once a search for a new
      CEO was completed. [ 26 ]\\nIn January 2017, veteran software executive Daniel
      Springer was named the new CEO. [ 27 ] [ 28 ]\\nDocusign ranked number 6 on
      Fast Company's Most Innovative Enterprise Tech Companies of 2022, with an overall
      market share of 61%. [ 29 ]\\nOn June 21, 2022, Daniel Springer was replaced
      as CEO by Mary Agnes \\\"Maggie\\\" Wilderotter, [ 30 ] and later Allan Thygesen
      as CEO on September 22, 2022. Thygesen assumed office on October 10. [ 31 ]\\nIn
      April 2024, the company announced a significant expansion of its company strategy,
      opening up a new SaaS category \u2014 Intelligent Agreement Management \u2014
      and launching Docusign IAM, an Intelligent Agreement Management platform and
      new line-of-business-focused applications to lead that category. [ 32 ] [ 33
      ]\\nFunding [ edit ]\\nIn 2004, Docusign raised $4.6 million from Ignition Partners
      and Frazier Technology Ventures. [ 34 ] In 2006, Sigma Partners became the largest
      shareholder, a position it held at the time of the IPO, with returns over $700\_million.
      [ 35 ] Between 2006 and 2009 Docusign raised $30\_million that allowed the firm
      to add corporate clients and process 48\_million signatures. [ 36 ]\\nIn July
      2012, Docusign raised $47.5 million in venture funding from investors including
      Kleiner Perkins Caufield & Byers ; the round later grew closer to $56\_million.
      [ 37 ] [ 38 ] In March 2014, the company announced it had raised $85\_million
      in a new funding round. [ 39 ] Though unconfirmed, The Wall Street Journal reported
      the round was based on a company valuation of $1.6\_billion. [ 40 ]\\nIn May
      2015, the company announced it had raised $233\_million in a new funding round,
      with some estimating a $3\_billion company valuation. [ 41 ] [ 42 ]\\nIn 2018,
      the company announced plans for an initial public offering on the Nasdaq , [
      43 ] The IPO was completed on April 27, in which the company raised $543\_million.
      Neither the original founders nor CEO Daniel Springer were major shareholders
      at that time. [ 44 ] Former CEO Keith Krach was the largest individual shareholder
      at 5.5%, about 8.5\_million shares at the time of the IPO. Venture capital firms
      Sigma Partners, Ignition Partners, and now-defunct company Frazier Technology
      Ventures were the largest non-individual shareholders. [ 8 ]\\nAcquisition history
      [ edit ]\\nIn July 2018, Docusign acquired SpringCM for $220 million. [ 45 ]\\nIn
      February 2020, Docusign acquired Seal Software for $188 million. [ 46 ]\\nOn
      June 1, 2021, DocuSign acquired Clause, a smart legal contract technology startup.
      [ 47 ] [ 48 ]\\nThe company acquired Lexion, an AI-powered agreement management
      tool, in May 2024 for a reported $165 million. [ 49 ]\\nProducts [ edit ]\\nDocusign's
      services are offered either by subscription or through a mobile app . Docusign
      released the mobile app in November 2011. [ 50 ]\\nDocusign Professional emails
      recipients an electronically signed document requesting review of a document
      after it is uploaded. Each party must agree to complete business electronically,
      review the document, and apply a signature. Signatures may be added from a stored
      copy of a signature or generated automatically by the software. Phone confirmation
      and background checks are offered as premium services. [ 51 ]\\nLitigation [
      edit ]\\nIn a 2016 case, it was found that a lawyer in Sacramento who had exclusively
      been using Docusign signatures had the signatures rendered invalid due to the
      legal requirements of a physical signature known as a wet signature . [ 52 ]\\nA
      class action lawsuit began against Docusign in 2022 regarding their conduct
      from 2020-2021 that alleged the company misled investors and shareholders with
      false reporting. According to the initial complaint, Docusign \\\"failed to
      disclose the role the COVID-19 pandemic had on its growth, including the positive
      impact on Docusign's business. [Docusign] also downplayed the impact that a
      'return to normal' would have on the Company's growth and business.\\\" [ 53
      ] [ 54 ]\\nIn 2023, the company's former CEO Daniel Springer filed a lawsuit
      against Docusign. While the company claimed that Springer had resigned, his
      lawsuit alleged that the resignation was fabricated. [ 55 ]\\nDocusign IMPACT
      Foundation [ edit ]\\nKrach announces the formation of the IMPACT Foundation
      at the Momentum user conference, 15 March 2015.\\nOn 15 March 2015, CEO Keith
      Krach announced the formation of the $30 million\u202FDocusign IMPACT Foundation,
      a philanthropy department of the company to donate to charities. [ 56 ]\\nSee
      also [ edit ]\\nAdobe Sign\\nHandwriting recognition\\nHelloSign\\nOneSpan\\nPandaDoc\\nTitle
