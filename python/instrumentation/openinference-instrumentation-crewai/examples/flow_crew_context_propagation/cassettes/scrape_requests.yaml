        class=\"cite-bracket\">&#93;</span></a></sup></td></tr></tbody></table>\n<p><b>Arrow
        Electronics, Inc.</b>, is an American company headquartered in <a href=\"/wiki/Centennial,_Colorado\"
        title=\"Centennial, Colorado\">Centennial, Colorado</a>. A global provider
        of <a href=\"/wiki/Electronic_components\" class=\"mw-redirect\" title=\"Electronic
        components\">electronic components</a> and enterprise computing products,
        the company specializes in distribution and value-added services for original
        equipment manufacturers, value-added resellers, managed service providers,
        contract manufacturers and other commercial customers. The company is ranked
        No. 154 in the <a href=\"/wiki/Fortune_500\" title=\"Fortune 500\">Fortune
        500</a> list of the largest United States corporations by total revenue.<sup
        id=\"cite&#95;ref-:0&#95;3-0\" class=\"reference\"><a href=\"#cite_note-:0-3\"><span
        class=\"cite-bracket\">&#91;</span>3<span class=\"cite-bracket\">&#93;</span></a></sup>
        The company has also been recognized for 26 years overall on Fortune's \"World's
        Most Admired Companies\" list.<sup id=\"cite&#95;ref-:1&#95;4-0\" class=\"reference\"><a
        href=\"#cite_note-:1-4\"><span class=\"cite-bracket\">&#91;</span>4<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<meta
        property=\"mw:PageProp/toc\" />\n<div class=\"mw-heading mw-heading2\"><h2
        id=\"History\">History</h2><span class=\"mw-editsection\"><span class=\"mw-editsection-bracket\">[</span><a
        href=\"/w/index.php?title=Arrow_Electronics&amp;action=edit&amp;section=1\"
        title=\"Edit section: History\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<p>Arrow
        Electronics was founded in 1935 when a retail store named Arrow Radio opened
        on <a href=\"/wiki/Cortlandt_Street_(Manhattan)\" title=\"Cortlandt Street
        (Manhattan)\">Cortlandt Street</a> in the heart of lower Manhattan's \"<a
        href=\"/wiki/Radio_Row\" title=\"Radio Row\">Radio Row</a>\", the birthplace
        of electronics distribution. Arrow Radio, established by Maurice (\"Murray\")
        Goldberg, sold used radios and radio parts to retail customers. Other industry
        pioneers with businesses nearby were <a href=\"/wiki/Charles_Avnet\" title=\"Charles
        Avnet\">Charles Avnet</a> and Seymour Schweber.<sup id=\"cite&#95;ref-:2&#95;5-0\"
        class=\"reference\"><a href=\"#cite_note-:2-5\"><span class=\"cite-bracket\">&#91;</span>5<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>By the 1940s, Arrow
        was selling new radios\u2014manufactured by RCA, GE, and Philco\u2014and other
        home entertainment products, as well as surplus radio parts that were retailed
        over-the-counter in a parts department at the back of the store. Soon the
        firm started seeking franchises to sell new parts; the first manufacturers
        to franchise Arrow were RCA and Cornell Dubilier. The business was incorporated
        as Arrow Electronics, Inc., in 1946.<sup id=\"cite&#95;ref-:2&#95;5-1\" class=\"reference\"><a
        href=\"#cite_note-:2-5\"><span class=\"cite-bracket\">&#91;</span>5<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In
        the early 1950s, with additional franchises and a small field sales organization,
        Arrow began selling electronic parts to industrial customers. A second storefront/sales
        office was opened in Mineola, Long Island, in 1956. By 1961, when the company
        completed its initial public offering and listed its shares on the American
        Stock Exchange, total sales amounted to $4 million, over half of which came
        from the industrial sales division, with the remainder from the traditional
        retail business. During the 1960s, Arrow moved its headquarters to <a href=\"/wiki/Farmingdale,_New_York\"
        title=\"Farmingdale, New York\">Farmingdale, New York</a> (<a href=\"/wiki/Long_Island\"
        title=\"Long Island\">Long Island</a>), and opened additional branches in
        <a href=\"/wiki/Norwalk,_Connecticut\" title=\"Norwalk, Connecticut\">Norwalk,
        Connecticut</a>, and <a href=\"/wiki/Totowa,_New_Jersey\" title=\"Totowa,
        New Jersey\">Totowa, New Jersey</a>. The company relocated its headquarters
        office to Centennial, Colorado, in 2011.<sup id=\"cite&#95;ref-6\" class=\"reference\"><a
        href=\"#cite_note-6\"><span class=\"cite-bracket\">&#91;</span>6<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In
        1968, Glenn, Green &amp; Waddell, a partnership formed by three recent graduates
        of the Harvard Business School, B. Duke Glenn, Jr., Roger E. Green, and John
        C. Waddell, led a private investor group that acquired the controlling interest
        in Arrow. The investors saw an opportunity to consolidate the fragmented electronics
        industry. Duke Glenn served as chairman.<sup class=\"noprint Inline-Template
        Template-Fact\" style=\"white-space:nowrap;\">&#91;<i><a href=\"/wiki/Wikipedia:Citation_needed\"
        title=\"Wikipedia:Citation needed\"><span title=\"This claim needs references
        to reliable sources. (April 2024)\">citation needed</span></a></i>&#93;</sup>\n</p>\n<div
        class=\"mw-heading mw-heading2\"><h2 id=\"1970s\">1970s</h2><span class=\"mw-editsection\"><span
        class=\"mw-editsection-bracket\">[</span><a href=\"/w/index.php?title=Arrow_Electronics&amp;action=edit&amp;section=2\"
        title=\"Edit section: 1970s\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<p>Entering
        the 1970s with $9 million of annual distribution sales, Arrow ranked no. 12
        among U.S. electronics distributors. No. 1\u2013ranked <a href=\"/wiki/Avnet\"
        title=\"Avnet\">Avnet</a> was 8-times Arrow's size.<sup class=\"noprint Inline-Template
        Template-Fact\" style=\"white-space:nowrap;\">&#91;<i><a href=\"/wiki/Wikipedia:Citation_needed\"
        title=\"Wikipedia:Citation needed\"><span title=\"This claim needs references
        to reliable sources. (April 2024)\">citation needed</span></a></i>&#93;</sup>\n</p><p>During
        the 1970s decade, by winning key semiconductor franchises (led by <a href=\"/wiki/Texas_Instruments\"
        title=\"Texas Instruments\">Texas Instruments</a> in 1970) and opening sales
        offices in over 20 U.S. cities, Arrow grew its electronics distribution business
        at an average annual rate of 34 percent. By the end of the decade, the company's
        electronics distribution sales had climbed to $177 million, making Arrow the
        country's second largest electronics distributor.<sup id=\"cite&#95;ref-:2&#95;5-2\"
        class=\"reference\"><a href=\"#cite_note-:2-5\"><span class=\"cite-bracket\">&#91;</span>5<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>The company took on
        high levels of debt through frequent public bond offerings, to fund its growth
        strategy. Additional growth capital was provided through the 1969 acquisition
        of Schuylkill Metals Corporation, a lead recycling company. (This business,
        having served its purpose, was sold in 1987 amidst problems associated with
        being designated an EPA Superfund site contaminated with lead and <a href=\"/wiki/Chromium\"
        title=\"Chromium\">chromium</a>.<sup id=\"cite&#95;ref-7\" class=\"reference\"><a
        href=\"#cite_note-7\"><span class=\"cite-bracket\">&#91;</span>7<span class=\"cite-bracket\">&#93;</span></a></sup>)\n</p><p>In
        the 1970s, Arrow discontinued its retail operations and inaugurated the electronics
        distribution's first integrated online, real-time computer system to provide
        up-to-the-minute inventory positions and facilitate remote order entry. In
        1979, Arrow was listed on the New York Stock Exchange. That same year, it
        acquired Cramer Electronics (historically the U.S.'s second-largest distributor),
        the company's first major industry acquisition, which provided access to many
        markets in the western United States.<sup id=\"cite&#95;ref-:2&#95;5-3\" class=\"reference\"><a
        href=\"#cite_note-:2-5\"><span class=\"cite-bracket\">&#91;</span>5<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<div
        class=\"mw-heading mw-heading2\"><h2 id=\"1980s_to_present\">1980s to present</h2><span
        class=\"mw-editsection\"><span class=\"mw-editsection-bracket\">[</span><a
        href=\"/w/index.php?title=Arrow_Electronics&amp;action=edit&amp;section=3\"
        title=\"Edit section: 1980s to present\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<p>On
        December 4, 1980, the <a href=\"/wiki/Stouffer%27s_Inn_fire\" title=\"Stouffer&#39;s
        Inn fire\">Stouffer's Inn Fire</a> killed 13 members of Arrow's senior management,
        including Glenn and Green. Waddell assumed leadership and, in 1982, recruited
        Stephen P. Kaufman, formerly a partner of <a href=\"/wiki/McKinsey_%26_Company\"
        title=\"McKinsey &amp; Company\">McKinsey &amp; Company</a>, to join Arrow
        as president of the company's electronics distribution division. Kaufman succeeded
        Waddell as CEO in 1986 and as chairman in 1994.<sup id=\"cite&#95;ref-8\"
        class=\"reference\"><a href=\"#cite_note-8\"><span class=\"cite-bracket\">&#91;</span>8<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In 1988, Arrow adopted
        a growth strategy by acquiring Kierulff Electronics. According to Forbes,
        the company closed down all four Kierulff Electronics warehouses and within
        a year it experienced \"miraculous\" growth that went from a bottom line of
        $16 million loss in 1987 to operating profits of $10 million.<sup id=\"cite&#95;ref-9\"
        class=\"reference\"><a href=\"#cite_note-9\"><span class=\"cite-bracket\">&#91;</span>9<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>During his nearly two
        decades with Arrow, Kaufman led the company's consolidation of the U.S. electronics
        distribution industry as well as the company's expansion into Europe and the
        Asia Pacific region. Under Kaufman's leadership, Arrow completed over 50 acquisitions
        of electronics distributors, including such prominent names as <a href=\"/wiki/Ducommun\"
        title=\"Ducommun\">Ducommun</a> (Kierulff), Lex (Schweber), Zeus, Anthem,
        Bell, and Wyle (all in the U.S.), Spoerle (<a href=\"/wiki/Germany\" title=\"Germany\">Germany</a>),
        Silverstar (<a href=\"/wiki/Italy\" title=\"Italy\">Italy</a>), and CAL (<a
        href=\"/wiki/Hong_Kong\" title=\"Hong Kong\">Hong Kong</a> and <a href=\"/wiki/China\"
        title=\"China\">China</a>). Kaufman also led the company into the national
        distribution of commercial computer products, initially through its acquisition
        of Gates/FA Distributing. Arrow entered the 21st century with global electronic
        component sales of $9 billion and $3 billion of sales in its computer products
        business.<sup id=\"cite&#95;ref-:2&#95;5-4\" class=\"reference\"><a href=\"#cite_note-:2-5\"><span
        class=\"cite-bracket\">&#91;</span>5<span class=\"cite-bracket\">&#93;</span></a></sup>
        In 1998, Arrow Electronics established a 50/50 <a href=\"/wiki/Joint_venture\"
        title=\"Joint venture\">joint venture</a> with <a href=\"/w/index.php?title=Marubun_Corporation&amp;action=edit&amp;redlink=1\"
        class=\"new\" title=\"Marubun Corporation (page does not exist)\">Marubun
        Corporation</a><span class=\"noprint\" style=\"font-size:85%; font-style:
        normal;\">&#160;&#91;<a href=\"https://ja.wikipedia.org/wiki/%E4%B8%B8%E6%96%87\"
        class=\"extiw\" title=\"ja:\u4E38\u6587\">ja</a>&#93;</span> of Japan called
        <b>Marubun/Arrow</b> in order to augment and support each other's operations
        in Asia and North America.<sup id=\"cite&#95;ref-10\" class=\"reference\"><a
        href=\"#cite_note-10\"><span class=\"cite-bracket\">&#91;</span>10<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>Kaufman
        stepped down as CEO in 2000, retired as chairman in 2002, and was succeeded
        by Daniel W. Duval, a 15-year Arrow board veteran. In 2003, William E. Mitchell,
        former president of the global services division of Solectron Corporation,
        joined Arrow as chief executive officer and,<sup id=\"cite&#95;ref-Arrow-Electronics-Jan-2003-8-K&#95;11-0\"
        class=\"reference\"><a href=\"#cite_note-Arrow-Electronics-Jan-2003-8-K-11\"><span
        class=\"cite-bracket\">&#91;</span>11<span class=\"cite-bracket\">&#93;</span></a></sup>
        in 2006, became chairman. During Mitchell's six years at Arrow, sales climbed
        to $17 billion as the company increased shareholder returns, improved operating
        efficiencies, and completed 17 acquisitions.<sup id=\"cite&#95;ref-:2&#95;5-5\"
        class=\"reference\"><a href=\"#cite_note-:2-5\"><span class=\"cite-bracket\">&#91;</span>5<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In 2009, Michael J.
        Long succeeded Mitchell as CEO, and in 2010 took over as chairman.<sup id=\"cite&#95;ref-Arrow-Electronics-Mar-2009-8-K&#95;12-0\"
        class=\"reference\"><a href=\"#cite_note-Arrow-Electronics-Mar-2009-8-K-12\"><span
        class=\"cite-bracket\">&#91;</span>12<span class=\"cite-bracket\">&#93;</span></a></sup><sup
        id=\"cite&#95;ref-Arrow-Electronics-Dec-2009-8-K&#95;13-0\" class=\"reference\"><a
        href=\"#cite_note-Arrow-Electronics-Dec-2009-8-K-13\"><span class=\"cite-bracket\">&#91;</span>13<span
        class=\"cite-bracket\">&#93;</span></a></sup> A long-time Arrow executive,
        Long joined the company in 1991 through the merger with Schweber Electronics
        and served in various senior management positions before becoming CEO. During
        Long's tenure, Arrow completed over 40 strategic acquisitions that further
        expanded its global components and computer systems businesses. In 2015, Arrow
        acquired United Technical Publishing from <a href=\"/wiki/Hearst_Communications\"
        title=\"Hearst Communications\">Hearst</a>, adding properties such as <i><a
        href=\"/wiki/Electronic_Products\" title=\"Electronic Products\">Electronic
        Products</a></i> and Schematics.com.<sup id=\"cite&#95;ref-14\" class=\"reference\"><a
        href=\"#cite_note-14\"><span class=\"cite-bracket\">&#91;</span>14<span class=\"cite-bracket\">&#93;</span></a></sup>
        In June 2016, <a href=\"/wiki/UBM_plc\" title=\"UBM plc\">UBM</a> reached
        agreement to divest its electronics media portfolio to an affiliate of Arrow
        Electronics Inc. for a cash consideration of $23.5 million. The portfolio
        comprises the U.S. and Asian versions of <a href=\"/wiki/EE_Times\" title=\"EE
        Times\">EE Times</a>, <a href=\"/wiki/EDN_(magazine)\" title=\"EDN (magazine)\">EDN</a>,
        ESM, Embedded, EBN, TechOnline and Datasheets.com.<sup id=\"cite&#95;ref-15\"
        class=\"reference\"><a href=\"#cite_note-15\"><span class=\"cite-bracket\">&#91;</span>15<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In June 2022, Sean J.
        Kerins succeeded Long as president and CEO. Having joined Arrow in 2007 as
        vice president of North America storage and networking, Kerins went on to
        serve as president of the company\u2019s North America enterprise computing
        solutions business before being named global president of the business in
        2014 and then chief operating officer in 2020.<sup id=\"cite&#95;ref-16\"
        class=\"reference\"><a href=\"#cite_note-16\"><span class=\"cite-bracket\">&#91;</span>16<span
        class=\"cite-bracket\">&#93;</span></a></sup>  Kerins separated from the company
        in September 2025.\n</p><p>Arrow is ranked No. 154 on the <a href=\"/wiki/Fortune_500\"
        title=\"Fortune 500\">Fortune 500</a> list of the largest United States corporations
        by total revenue.<sup id=\"cite&#95;ref-:0&#95;3-1\" class=\"reference\"><a
        href=\"#cite_note-:0-3\"><span class=\"cite-bracket\">&#91;</span>3<span class=\"cite-bracket\">&#93;</span></a></sup>
        The company has also been recognized for 26 years overall on Fortune's \u201CWorld\u2019s
        Most Admired Companies\u201D list.<sup id=\"cite&#95;ref-:1&#95;4-1\" class=\"reference\"><a
        href=\"#cite_note-:1-4\"><span class=\"cite-bracket\">&#91;</span>4<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<div
        class=\"mw-heading mw-heading2\"><h2 id=\"Recent_acquisitions\">Recent acquisitions</h2><span
        class=\"mw-editsection\"><span class=\"mw-editsection-bracket\">[</span><a
        href=\"/w/index.php?title=Arrow_Electronics&amp;action=edit&amp;section=4\"
        title=\"Edit section: Recent acquisitions\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<table
        class=\"wikitable\">\n<caption>\n</caption>\n<tbody><tr>\n<th>Company name\n</th>\n<th>Business\n</th>\n<th>Country\n</th>\n<th>Date
        of acquisition\n</th>\n<th>Reference\n</th></tr>\n<tr>\n<td>eInfochips\n</td>\n<td>Product
        Engineering and R&amp;D Services\n</td>\n<td>India\n</td>\n<td>Jan 2018\n</td>\n<td><sup
        id=\"cite&#95;ref-17\" class=\"reference\"><a href=\"#cite_note-17\"><span
