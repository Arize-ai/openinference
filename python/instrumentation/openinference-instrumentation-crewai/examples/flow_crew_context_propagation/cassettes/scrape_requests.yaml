        class=\"reference\"><a href=\"#cite_note-22\"><span class=\"cite-bracket\">&#91;</span>22<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</td></tr>\n<tr>\n<td>Converge\n</td>\n<td>Reverse
        logistics services provider\n</td>\n<td>United States\n</td></tr></tbody></table>\n<div
        class=\"mw-heading mw-heading2\"><h2 id=\"Sponsorship\">Sponsorship</h2><span
        class=\"mw-editsection\"><span class=\"mw-editsection-bracket\">[</span><a
        href=\"/w/index.php?title=Arrow_Electronics&amp;action=edit&amp;section=5\"
        title=\"Edit section: Sponsorship\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<p>Since
        2012, Arrow has been sponsoring <a href=\"/wiki/FIRST_Robotics_Competition\"
        title=\"FIRST Robotics Competition\">FIRST Robotics Competition</a>, an international
        high school robotics competition.<sup id=\"cite&#95;ref-23\" class=\"reference\"><a
        href=\"#cite_note-23\"><span class=\"cite-bracket\">&#91;</span>23<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In
        2019, after being a minor sponsor of the team, Arrow became the title sponsor
        of <a href=\"/wiki/Arrow_McLaren\" title=\"Arrow McLaren\">Schmidt Peterson
        Motorsport</a> (SPM) IndyCar team to become Arrow Schmidt Peterson Motorsport.<sup
        id=\"cite&#95;ref-24\" class=\"reference\"><a href=\"#cite_note-24\"><span
        class=\"cite-bracket\">&#91;</span>24<span class=\"cite-bracket\">&#93;</span></a></sup>
        In the same year, Arrow signed a sponsorship deal with <a href=\"/wiki/McLaren\"
        title=\"McLaren\">McLaren Racing</a>.<sup id=\"cite&#95;ref-25\" class=\"reference\"><a
        href=\"#cite_note-25\"><span class=\"cite-bracket\">&#91;</span>25<span class=\"cite-bracket\">&#93;</span></a></sup><sup
        id=\"cite&#95;ref-26\" class=\"reference\"><a href=\"#cite_note-26\"><span
        class=\"cite-bracket\">&#91;</span>26<span class=\"cite-bracket\">&#93;</span></a></sup>
        McLaren would later announce that they will be entering the <a href=\"/wiki/IndyCar_Series\"
        title=\"IndyCar Series\">IndyCar Series</a> with SPM as a joint entry for
        the 2020 season as Arrow McLaren SP.<sup id=\"cite&#95;ref-27\" class=\"reference\"><a
        href=\"#cite_note-27\"><span class=\"cite-bracket\">&#91;</span>27<span class=\"cite-bracket\">&#93;</span></a></sup>
        Arrow and McLaren signed a sponsorship extension in 2021<sup id=\"cite&#95;ref-28\"
        class=\"reference\"><a href=\"#cite_note-28\"><span class=\"cite-bracket\">&#91;</span>28<span
        class=\"cite-bracket\">&#93;</span></a></sup> that saw Arrow continue as a
        sponsor for the McLaren F1 Team and as title sponsor for the IndyCar team,
        which was rebranded as Arrow McLaren IndyCar Team with the 2023 season.<sup
        id=\"cite&#95;ref-29\" class=\"reference\"><a href=\"#cite_note-29\"><span
        class=\"cite-bracket\">&#91;</span>29<span class=\"cite-bracket\">&#93;</span></a></sup>
        The title sponsorship deal will end after the 2028 season.<sup id=\"cite&#95;ref-30\"
        class=\"reference\"><a href=\"#cite_note-30\"><span class=\"cite-bracket\">&#91;</span>30<span
        class=\"cite-bracket\">&#93;</span></a></sup><sup id=\"cite&#95;ref-31\" class=\"reference\"><a
        href=\"#cite_note-31\"><span class=\"cite-bracket\">&#91;</span>31<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<div
