        id=\"cite&#95;ref-10K&#95;4-0\" class=\"reference\"><a href=\"#cite_note-10K-4\"><span
        class=\"cite-bracket\">&#91;</span>4<span class=\"cite-bracket\">&#93;</span></a></sup></td></tr></tbody></table>\n<p><b>Docusign,
        Inc.</b> is an American software company headquartered in <a href=\"/wiki/San_Francisco\"
        title=\"San Francisco\">San Francisco</a>, California that provides products
        for organizations to manage electronic agreements with <a href=\"/wiki/Electronic_signature\"
        title=\"Electronic signature\">electronic signatures</a> on different devices.
        As of 2025<sup class=\"plainlinks noexcerpt noprint asof-tag update\" style=\"display:none;\"><a
        class=\"external text\" href=\"https://en.wikipedia.org/w/index.php?title=Docusign&amp;action=edit\">&#91;update&#93;</a></sup>,
        Docusign has about 1.7&#160;million clients in 180 countries.<sup id=\"cite&#95;ref-10K&#95;4-1\"
        class=\"reference\"><a href=\"#cite_note-10K-4\"><span class=\"cite-bracket\">&#91;</span>4<span
        class=\"cite-bracket\">&#93;</span></a></sup> Signatures processed by Docusign
        are compliant with the US <a href=\"/wiki/Electronic_Signatures_in_Global_and_National_Commerce_Act\"
        title=\"Electronic Signatures in Global and National Commerce Act\">ESIGN
        Act</a><sup id=\"cite&#95;ref-ESIGN&#95;5-0\" class=\"reference\"><a href=\"#cite_note-ESIGN-5\"><span
        class=\"cite-bracket\">&#91;</span>5<span class=\"cite-bracket\">&#93;</span></a></sup>
        and the European Union's <a href=\"/wiki/EIDAS\" title=\"EIDAS\">eIDAS</a>
        regulation, including EU Advanced and EU Qualified Signatures.<sup id=\"cite&#95;ref-6\"
        class=\"reference\"><a href=\"#cite_note-6\"><span class=\"cite-bracket\">&#91;</span>6<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In April 2018, Docusign
        filed for an <a href=\"/wiki/Initial_public_offering\" title=\"Initial public
        offering\">initial public offering</a>. At the time of the IPO, the largest
        shareholders were venture investment firms Sigma Partners, Ignition Partners,
        Frazier Technology Ventures, and former CEO <a href=\"/wiki/Keith_J._Krach\"
        title=\"Keith J. Krach\">Keith Krach</a> was the largest individual shareholder.
        None of the original founders are major shareholders.<sup id=\"cite&#95;ref-7\"
        class=\"reference\"><a href=\"#cite_note-7\"><span class=\"cite-bracket\">&#91;</span>7<span
        class=\"cite-bracket\">&#93;</span></a></sup><sup id=\"cite&#95;ref-ipoinvestors&#95;8-0\"
        class=\"reference\"><a href=\"#cite_note-ipoinvestors-8\"><span class=\"cite-bracket\">&#91;</span>8<span
        class=\"cite-bracket\">&#93;</span></a></sup> The company went public on the
        <a href=\"/wiki/Nasdaq\" title=\"Nasdaq\">Nasdaq</a> on April 27, 2018.<sup
        id=\"cite&#95;ref-9\" class=\"reference\"><a href=\"#cite_note-9\"><span class=\"cite-bracket\">&#91;</span>9<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<meta property=\"mw:PageProp/toc\"
        />\n<div class=\"mw-heading mw-heading2\"><h2 id=\"History\">History</h2><span
        class=\"mw-editsection\"><span class=\"mw-editsection-bracket\">[</span><a
        href=\"/w/index.php?title=Docusign&amp;action=edit&amp;section=1\" title=\"Edit
        section: History\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<p>Docusign
        was founded in 2003 by Court Lorenzini, Tom Gonser, and Eric Ranft.<sup id=\"cite&#95;ref-10\"
        class=\"reference\"><a href=\"#cite_note-10\"><span class=\"cite-bracket\">&#91;</span>10<span
        class=\"cite-bracket\">&#93;</span></a></sup> Tom Gonser came up with the
        idea when he was  <a href=\"/wiki/CEO\" class=\"mw-redirect\" title=\"CEO\">CEO</a>
        of NetUpdate, a company he founded in 1998. Throughout its history, NetUpdate
        had acquired several companies, including an e-signature start-up in Seattle
        called DocuTouch, funded by Timberline Venture Partners, Bill Kallman, and
        Jeff Tung with $4M. Timberline invested another $1 million in the merger into
        NetUpdate.<sup id=\"cite&#95;ref-DocGon&#95;11-0\" class=\"reference\"><a
        href=\"#cite_note-DocGon-11\"><span class=\"cite-bracket\">&#91;</span>11<span
        class=\"cite-bracket\">&#93;</span></a></sup><sup id=\"cite&#95;ref-NetUp&#95;12-0\"
        class=\"reference\"><a href=\"#cite_note-NetUp-12\"><span class=\"cite-bracket\">&#91;</span>12<span
        class=\"cite-bracket\">&#93;</span></a></sup> DocuTouch held patents on Web-based
        digital signatures and collaboration. With internal support from Gonser, Lorenzini
        negotiated the purchase of certain DocuTouch assets from NetUpdate and started
        Docusign. Gonser then left the NetUpdate Board to focus on Docusign full-time.\n</p><p>The
        firm began sales in 2005 when zipForm, now zipLogix, integrated Docusign into
        its virtual real estate forms. According to Docusign, mock trials featuring
        licensed attorneys and judges highlighted the admissibility of Docusign contracts
        in court based on encrypted audit logs of signature events, and the impossibility
        of changing contracts.<sup id=\"cite&#95;ref-Mock&#95;13-0\" class=\"reference\"><a
        href=\"#cite_note-Mock-13\"><span class=\"cite-bracket\">&#91;</span>13<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In January 2007, Court
        Lorenzini stepped down as CEO and board chairman and was replaced as CEO by
        Matthew Schiltz,<sup id=\"cite&#95;ref-14\" class=\"reference\"><a href=\"#cite_note-14\"><span
        class=\"cite-bracket\">&#91;</span>14<span class=\"cite-bracket\">&#93;</span></a></sup>
        who served in that role until January 2010.<sup id=\"cite&#95;ref-:1&#95;15-0\"
        class=\"reference\"><a href=\"#cite_note-:1-15\"><span class=\"cite-bracket\">&#91;</span>15<span
        class=\"cite-bracket\">&#93;</span></a></sup> Steven King replaced Schultz
        as CEO<sup id=\"cite&#95;ref-:1&#95;15-1\" class=\"reference\"><a href=\"#cite_note-:1-15\"><span
        class=\"cite-bracket\">&#91;</span>15<span class=\"cite-bracket\">&#93;</span></a></sup>
        and moved the corporate headquarters from Seattle to San Francisco. <a href=\"/wiki/Keith_Krach\"
        class=\"mw-redirect\" title=\"Keith Krach\">Keith Krach</a> became Docusign's
        board chairman in January 2010 and its CEO in August 2011.<sup id=\"cite&#95;ref-16\"
        class=\"reference\"><a href=\"#cite_note-16\"><span class=\"cite-bracket\">&#91;</span>16<span
        class=\"cite-bracket\">&#93;</span></a></sup> \n</p><p>Docusign began referring
        to its service as \"eSignature Transaction Management\". By the end of 2010,
        the company had handled 73 percent of the <a href=\"/wiki/Software_as_a_service\"
        title=\"Software as a service\">SaaS</a>-based electronic signature market,
        with 80 million signatures processed.<sup id=\"cite&#95;ref-80Mil&#95;17-0\"
        class=\"reference\"><a href=\"#cite_note-80Mil-17\"><span class=\"cite-bracket\">&#91;</span>17<span
        class=\"cite-bracket\">&#93;</span></a></sup> <a href=\"/wiki/Scale_Venture_Partners\"
        title=\"Scale Venture Partners\">Scale Venture Partners</a> led an investment
        round of $27 million in December 2010.<sup id=\"cite&#95;ref-Scale&#95;18-0\"
        class=\"reference\"><a href=\"#cite_note-Scale-18\"><span class=\"cite-bracket\">&#91;</span>18<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>Docusign opened an office
        in <a href=\"/wiki/London\" title=\"London\">London</a>, <a href=\"/wiki/England\"
        title=\"England\">England</a>, in September 2011.<sup id=\"cite&#95;ref-London&#95;19-0\"
        class=\"reference\"><a href=\"#cite_note-London-19\"><span class=\"cite-bracket\">&#91;</span>19<span
        class=\"cite-bracket\">&#93;</span></a></sup>  In the same year, Docusign
        opened an office in <a href=\"/wiki/San_Francisco\" title=\"San Francisco\">San
        Francisco</a> that now functions as its global headquarters.<sup id=\"cite&#95;ref-20\"
        class=\"reference\"><a href=\"#cite_note-20\"><span class=\"cite-bracket\">&#91;</span>20<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>Docusign signed an agreement
        with <a href=\"/wiki/PayPal\" title=\"PayPal\">PayPal</a> in April 2012 that
        allowed users to capture signatures and payments in a single transaction.<sup
        id=\"cite&#95;ref-PayPal&#95;21-0\" class=\"reference\"><a href=\"#cite_note-PayPal-21\"><span
        class=\"cite-bracket\">&#91;</span>21<span class=\"cite-bracket\">&#93;</span></a></sup>
        \ Similar partnerships with <a href=\"/wiki/Salesforce\" title=\"Salesforce\">Salesforce</a><sup
        id=\"cite&#95;ref-Salesforce&#95;22-0\" class=\"reference\"><a href=\"#cite_note-Salesforce-22\"><span
        class=\"cite-bracket\">&#91;</span>22<span class=\"cite-bracket\">&#93;</span></a></sup>
        and <a href=\"/wiki/Google_Drive\" title=\"Google Drive\">Google Drive</a><sup
        id=\"cite&#95;ref-Google&#95;23-0\" class=\"reference\"><a href=\"#cite_note-Google-23\"><span
        class=\"cite-bracket\">&#91;</span>23<span class=\"cite-bracket\">&#93;</span></a></sup>
        preceded the <a href=\"/wiki/PayPal\" title=\"PayPal\">PayPal</a> agreement.\n</p><p>On
        January 10, 2013, Docusign and <a href=\"/wiki/Equifax\" title=\"Equifax\">Equifax</a>
        announced a partnership to simplify electronic delivery of the Requests for
        Transcript of Tax Return Form 4506-T to the United States <a href=\"/wiki/Internal_Revenue_Service\"
        title=\"Internal Revenue Service\">Internal Revenue Service</a>. Under the
        partnership, Equifax allows lenders to use Docusign to securely send requests
        to loan applicants. Docusign and<sup id=\"cite&#95;ref-24\" class=\"reference\"><a
        href=\"#cite_note-24\"><span class=\"cite-bracket\">&#91;</span>24<span class=\"cite-bracket\">&#93;</span></a></sup>
        Equifax were among 14 firms that participated in a nine-month feasibility
        study of electronic signatures for 4506-T forms in 2011.<sup id=\"cite&#95;ref-Equifax&#95;25-0\"
        class=\"reference\"><a href=\"#cite_note-Equifax-25\"><span class=\"cite-bracket\">&#91;</span>25<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In October 2015, <a
        href=\"/wiki/Keith_Krach\" class=\"mw-redirect\" title=\"Keith Krach\">Keith
        Krach</a> announced he would step down as CEO once a search for a new CEO
        was completed.<sup id=\"cite&#95;ref-26\" class=\"reference\"><a href=\"#cite_note-26\"><span
        class=\"cite-bracket\">&#91;</span>26<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In
        January 2017, veteran <a href=\"/wiki/Software\" title=\"Software\">software</a>
        <a href=\"/wiki/Senior_management\" title=\"Senior management\">executive</a>
        Daniel Springer was named the new CEO.<sup id=\"cite&#95;ref-27\" class=\"reference\"><a
        href=\"#cite_note-27\"><span class=\"cite-bracket\">&#91;</span>27<span class=\"cite-bracket\">&#93;</span></a></sup><sup
        id=\"cite&#95;ref-28\" class=\"reference\"><a href=\"#cite_note-28\"><span
        class=\"cite-bracket\">&#91;</span>28<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>Docusign
        ranked number 6 on <a href=\"/wiki/Fast_Company\" title=\"Fast Company\">Fast
        Company's</a> Most Innovative Enterprise Tech Companies of 2022, with an overall
        market share of 61%.<sup id=\"cite&#95;ref-29\" class=\"reference\"><a href=\"#cite_note-29\"><span
        class=\"cite-bracket\">&#91;</span>29<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>On
        June 21, 2022, Daniel Springer was replaced as CEO by Mary Agnes \"Maggie\"
        Wilderotter,<sup id=\"cite&#95;ref-30\" class=\"reference\"><a href=\"#cite_note-30\"><span
        class=\"cite-bracket\">&#91;</span>30<span class=\"cite-bracket\">&#93;</span></a></sup>
        and later Allan Thygesen as CEO on September 22, 2022. Thygesen assumed office
        on October 10.<sup id=\"cite&#95;ref-31\" class=\"reference\"><a href=\"#cite_note-31\"><span
        class=\"cite-bracket\">&#91;</span>31<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In
        April 2024, the company announced a significant expansion of its company strategy,
        opening up a new SaaS category \u2014 Intelligent Agreement Management \u2014
        and launching Docusign IAM, an Intelligent Agreement Management platform and
        new line-of-business-focused applications to lead that category.<sup id=\"cite&#95;ref-32\"
        class=\"reference\"><a href=\"#cite_note-32\"><span class=\"cite-bracket\">&#91;</span>32<span
        class=\"cite-bracket\">&#93;</span></a></sup><sup id=\"cite&#95;ref-33\" class=\"reference\"><a
        href=\"#cite_note-33\"><span class=\"cite-bracket\">&#91;</span>33<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<div
        class=\"mw-heading mw-heading3\"><h3 id=\"Funding\">Funding</h3><span class=\"mw-editsection\"><span
        class=\"mw-editsection-bracket\">[</span><a href=\"/w/index.php?title=Docusign&amp;action=edit&amp;section=2\"
        title=\"Edit section: Funding\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<p>In
        2004, Docusign raised $4.6 million from Ignition Partners and Frazier Technology
        Ventures.<sup id=\"cite&#95;ref-Frazier&#95;34-0\" class=\"reference\"><a
        href=\"#cite_note-Frazier-34\"><span class=\"cite-bracket\">&#91;</span>34<span
        class=\"cite-bracket\">&#93;</span></a></sup> In 2006, Sigma Partners became
        the largest shareholder, a position it held at the time of the IPO, with returns
        over $700&#160;million.<sup id=\"cite&#95;ref-Sigma&#95;35-0\" class=\"reference\"><a
        href=\"#cite_note-Sigma-35\"><span class=\"cite-bracket\">&#91;</span>35<span
        class=\"cite-bracket\">&#93;</span></a></sup> Between 2006 and 2009 Docusign
        raised $30&#160;million that allowed the firm to add corporate clients and
        process 48&#160;million signatures.<sup id=\"cite&#95;ref-30M&#95;36-0\" class=\"reference\"><a
        href=\"#cite_note-30M-36\"><span class=\"cite-bracket\">&#91;</span>36<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In July 2012, Docusign
        raised $47.5 million in venture funding from investors including <a href=\"/wiki/Kleiner_Perkins_Caufield_%26_Byers\"
        class=\"mw-redirect\" title=\"Kleiner Perkins Caufield &amp; Byers\">Kleiner
        Perkins Caufield &amp; Byers</a>; the round later grew closer to $56&#160;million.<sup
        id=\"cite&#95;ref-37\" class=\"reference\"><a href=\"#cite_note-37\"><span
        class=\"cite-bracket\">&#91;</span>37<span class=\"cite-bracket\">&#93;</span></a></sup><sup
        id=\"cite&#95;ref-Kleiner&#95;38-0\" class=\"reference\"><a href=\"#cite_note-Kleiner-38\"><span
        class=\"cite-bracket\">&#91;</span>38<span class=\"cite-bracket\">&#93;</span></a></sup>
        In March 2014, the company announced it had raised $85&#160;million in a new
        funding round.<sup id=\"cite&#95;ref-39\" class=\"reference\"><a href=\"#cite_note-39\"><span
        class=\"cite-bracket\">&#91;</span>39<span class=\"cite-bracket\">&#93;</span></a></sup>
        \ Though unconfirmed, <i><a href=\"/wiki/The_Wall_Street_Journal\" title=\"The
        Wall Street Journal\">The Wall Street Journal</a></i> reported the round was
        based on a company valuation of $1.6&#160;billion.<sup id=\"cite&#95;ref-40\"
        class=\"reference\"><a href=\"#cite_note-40\"><span class=\"cite-bracket\">&#91;</span>40<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In May 2015, the company
        announced it had raised $233&#160;million in a new funding round, with some
        estimating a $3&#160;billion company valuation.<sup id=\"cite&#95;ref-41\"
        class=\"reference\"><a href=\"#cite_note-41\"><span class=\"cite-bracket\">&#91;</span>41<span
        class=\"cite-bracket\">&#93;</span></a></sup><sup id=\"cite&#95;ref-42\" class=\"reference\"><a
        href=\"#cite_note-42\"><span class=\"cite-bracket\">&#91;</span>42<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In
        2018, the company announced plans for an <a href=\"/wiki/Initial_public_offering\"
        title=\"Initial public offering\">initial public offering</a> on the <a href=\"/wiki/Nasdaq\"
        title=\"Nasdaq\">Nasdaq</a>,<sup id=\"cite&#95;ref-43\" class=\"reference\"><a
        href=\"#cite_note-43\"><span class=\"cite-bracket\">&#91;</span>43<span class=\"cite-bracket\">&#93;</span></a></sup>
        The IPO was completed on April 27, in which the company raised $543&#160;million.
        Neither the original founders nor CEO Daniel Springer were major shareholders
        at that time.<sup id=\"cite&#95;ref-44\" class=\"reference\"><a href=\"#cite_note-44\"><span
        class=\"cite-bracket\">&#91;</span>44<span class=\"cite-bracket\">&#93;</span></a></sup>
        Former CEO Keith Krach was the largest individual shareholder at 5.5%, about
        8.5&#160;million shares at the time of the IPO. Venture capital firms Sigma
        Partners, Ignition Partners, and now-defunct company Frazier Technology Ventures
        were the largest non-individual shareholders.<sup id=\"cite&#95;ref-ipoinvestors&#95;8-1\"
        class=\"reference\"><a href=\"#cite_note-ipoinvestors-8\"><span class=\"cite-bracket\">&#91;</span>8<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<div class=\"mw-heading
        mw-heading2\"><h2 id=\"Acquisition_history\">Acquisition history</h2><span
        class=\"mw-editsection\"><span class=\"mw-editsection-bracket\">[</span><a
        href=\"/w/index.php?title=Docusign&amp;action=edit&amp;section=3\" title=\"Edit
        section: Acquisition history\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<p>In
        July 2018, Docusign acquired <a href=\"/wiki/SpringCM\" title=\"SpringCM\">SpringCM</a>
        for $220 million.<sup id=\"cite&#95;ref-45\" class=\"reference\"><a href=\"#cite_note-45\"><span
        class=\"cite-bracket\">&#91;</span>45<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In
        February 2020, Docusign acquired Seal Software for $188 million.<sup id=\"cite&#95;ref-46\"
        class=\"reference\"><a href=\"#cite_note-46\"><span class=\"cite-bracket\">&#91;</span>46<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>On June 1, 2021, DocuSign
        acquired Clause, a smart legal contract technology startup.<sup id=\"cite&#95;ref-47\"
        class=\"reference\"><a href=\"#cite_note-47\"><span class=\"cite-bracket\">&#91;</span>47<span
        class=\"cite-bracket\">&#93;</span></a></sup><sup id=\"cite&#95;ref-48\" class=\"reference\"><a
        href=\"#cite_note-48\"><span class=\"cite-bracket\">&#91;</span>48<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>The
        company acquired Lexion, an AI-powered agreement management tool, in May 2024
        for a reported $165 million.<sup id=\"cite&#95;ref-49\" class=\"reference\"><a
        href=\"#cite_note-49\"><span class=\"cite-bracket\">&#91;</span>49<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<div
        class=\"mw-heading mw-heading2\"><h2 id=\"Products\">Products</h2><span class=\"mw-editsection\"><span
        class=\"mw-editsection-bracket\">[</span><a href=\"/w/index.php?title=Docusign&amp;action=edit&amp;section=4\"
        title=\"Edit section: Products\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<p>Docusign's
        services are offered either by subscription or through a <a href=\"/wiki/Mobile_app\"
        title=\"Mobile app\">mobile app</a>. Docusign released the mobile app in November
        2011.<sup id=\"cite&#95;ref-Digital&#95;50-0\" class=\"reference\"><a href=\"#cite_note-Digital-50\"><span
        class=\"cite-bracket\">&#91;</span>50<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>Docusign
        Professional emails recipients an electronically signed document requesting
        review of a document after it is uploaded. Each party must agree to complete
        business electronically, review the document, and apply a signature. Signatures
        may be added from a stored copy of a signature or generated automatically
        by the software. Phone confirmation and background checks are offered as premium
        services.<sup id=\"cite&#95;ref-DocuSign&#95;51-0\" class=\"reference\"><a
        href=\"#cite_note-DocuSign-51\"><span class=\"cite-bracket\">&#91;</span>51<span
        class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<div class=\"mw-heading
        mw-heading2\"><h2 id=\"Litigation\">Litigation</h2><span class=\"mw-editsection\"><span
        class=\"mw-editsection-bracket\">[</span><a href=\"/w/index.php?title=Docusign&amp;action=edit&amp;section=5\"
        title=\"Edit section: Litigation\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<p>In
        a 2016 case, it was found that a lawyer in Sacramento who had exclusively
        been using Docusign signatures had the signatures rendered invalid due to
        the legal requirements of a physical signature known as a <a href=\"/wiki/Signature#Wet_signatures\"
        title=\"Signature\">wet signature</a>.<sup id=\"cite&#95;ref-52\" class=\"reference\"><a
        href=\"#cite_note-52\"><span class=\"cite-bracket\">&#91;</span>52<span class=\"cite-bracket\">&#93;</span></a></sup>
        \n</p><p>A <a href=\"/wiki/Class_action\" title=\"Class action\">class action
        lawsuit</a> began against Docusign in 2022 regarding their conduct from 2020-2021
        that alleged the company misled investors and shareholders with false reporting.
        According to the initial complaint, Docusign \"failed to disclose the role
        the COVID-19 pandemic had on its growth, including the positive impact on
        Docusign's business. [Docusign] also downplayed the impact that a 'return
        to normal' would have on the Company's growth and business.\"<sup id=\"cite&#95;ref-53\"
        class=\"reference\"><a href=\"#cite_note-53\"><span class=\"cite-bracket\">&#91;</span>53<span
        class=\"cite-bracket\">&#93;</span></a></sup><sup id=\"cite&#95;ref-54\" class=\"reference\"><a
        href=\"#cite_note-54\"><span class=\"cite-bracket\">&#91;</span>54<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p><p>In
        2023, the company's former CEO Daniel Springer filed a lawsuit against Docusign.
        While the company claimed that Springer had resigned, his lawsuit alleged
        that the  resignation was fabricated.<sup id=\"cite&#95;ref-55\" class=\"reference\"><a
        href=\"#cite_note-55\"><span class=\"cite-bracket\">&#91;</span>55<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<div
        class=\"mw-heading mw-heading2\"><h2 id=\"Docusign_IMPACT_Foundation\">Docusign
        IMPACT Foundation</h2><span class=\"mw-editsection\"><span class=\"mw-editsection-bracket\">[</span><a
        href=\"/w/index.php?title=Docusign&amp;action=edit&amp;section=6\" title=\"Edit
        section: Docusign IMPACT Foundation\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<figure
        class=\"mw-default-size\" typeof=\"mw:File/Thumb\"><a href=\"/wiki/File:DocuSign_Impact_3.15.15.jpg\"
        class=\"mw-file-description\"><img src=\"//upload.wikimedia.org/wikipedia/commons/thumb/f/f4/DocuSign_Impact_3.15.15.jpg/250px-DocuSign_Impact_3.15.15.jpg\"
        decoding=\"async\" width=\"250\" height=\"188\" class=\"mw-file-element\"
        srcset=\"//upload.wikimedia.org/wikipedia/commons/thumb/f/f4/DocuSign_Impact_3.15.15.jpg/500px-DocuSign_Impact_3.15.15.jpg
        1.5x\" data-file-width=\"4032\" data-file-height=\"3024\" /></a><figcaption>Krach
        announces the formation of the IMPACT Foundation at the Momentum user conference,
        15 March 2015.</figcaption></figure>\n<p>On 15 March 2015, CEO Keith Krach
        announced the formation of the $30 million\u202FDocusign IMPACT Foundation,
        a <a href=\"/wiki/Philanthropy\" title=\"Philanthropy\">philanthropy</a> department
        of the company to donate to charities.<sup id=\"cite&#95;ref-56\" class=\"reference\"><a
        href=\"#cite_note-56\"><span class=\"cite-bracket\">&#91;</span>56<span class=\"cite-bracket\">&#93;</span></a></sup>\n</p>\n<div
        class=\"mw-heading mw-heading2\"><h2 id=\"See_also\">See also</h2><span class=\"mw-editsection\"><span
        class=\"mw-editsection-bracket\">[</span><a href=\"/w/index.php?title=Docusign&amp;action=edit&amp;section=7\"
        title=\"Edit section: See also\"><span>edit</span></a><span class=\"mw-editsection-bracket\">]</span></span></div>\n<ul><li><a
        href=\"/wiki/Adobe_Sign\" title=\"Adobe Sign\">Adobe Sign</a></li>\n<li><a
