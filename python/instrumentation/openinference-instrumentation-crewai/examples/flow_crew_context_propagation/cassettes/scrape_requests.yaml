      Preserve the original content exactly as-is. Do NOT rewrite, paraphrase, or
      modify the meaning of the content. Only structure it to match the schema format.\\n\\nDo
      not include the OpenAPI schema in the final output. Ensure the final output
      does not include any code block markers like ```json or ```python.\"},{\"role\":\"assistant\",\"content\":null,\"tool_calls\":[{\"id\":\"call_vSmaiV2b6sI2soPtLqmsDjre\",\"type\":\"function\",\"function\":{\"name\":\"read_website_content\",\"arguments\":\"{\\\"website_url\\\":\\\"https://en.wikipedia.org/wiki/Arrow_Electronics\\\"}\"}}]},{\"role\":\"tool\",\"tool_call_id\":\"call_vSmaiV2b6sI2soPtLqmsDjre\",\"name\":\"read_website_content\",\"content\":\"The
      following text is scraped website content:\\nArrow Electronics - Wikipedia\\nJump
