        displayName: Opus
        supportedEffortLevels:
        - low
        - medium
        - high
        - max
        supportsAdaptiveThinking: true
        supportsEffort: true
        value: opus
      - description: "Opus 4.6 for long sessions \xB7 $10/$37.50 per Mtok"
