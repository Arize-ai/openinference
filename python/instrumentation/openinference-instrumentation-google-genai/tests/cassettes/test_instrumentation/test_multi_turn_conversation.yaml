        is made of all colors:** White sunlight is actually a mixture of all the colors
        of the rainbow.\\n\\n*   **The atmosphere is full of particles:** The Earth's
        atmosphere contains tiny air molecules (mostly nitrogen and oxygen).\\n\\n*
        \  **Shorter wavelengths scatter more:** When sunlight enters the atmosphere,
        it collides with these air molecules. This collision causes the light to scatter
        in different directions. Shorter wavelengths of light (like blue and violet)
        are scattered more strongly than longer wavelengths (like red and orange).\\n\\n*
        \  **We see mostly blue:** Because blue light is scattered much more efficiently,
        it gets dispersed all over the sky. This scattered blue light reaches our
        eyes from all directions, making the sky appear blue.\\n\\n*   **Why not violet?**
        Violet light is scattered even *more* than blue light. However, the sun emits
        slightly less violet light than blue light, and our eyes are also less sensitive
        to violet. Therefore, we perceive the sky as blue rather than violet.\\n\\nSo,
        in short, the sky is blue because blue light from the sun is scattered more
        by the atmosphere than other colors, reaching our eyes from all directions.\\n\"\n
